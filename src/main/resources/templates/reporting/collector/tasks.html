<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Collector Tasks</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h1>Collector Tasks</h1>
    <table class="table mt-3">
        <thead>
        <tr>
            <th>Submitted At</th>
            <th>Address</th>
            <th>Ward</th>
            <th>Quantity</th>
            <th>Complete</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="r : ${reports}">
            <td th:text="${#temporals.format(r.createdAt, 'yyyy-MM-dd HH:mm:ss')}"></td>
            <td th:text="${r.address}"></td>
            <td th:text="${r.ward != null} ? ${r.ward.name} : 'N/A'"></td>
            <td th:text="${r.quantity}"></td>
            <td>
                <form th:action="@{/collector/complete}" method="post" enctype="multipart/form-data" style="display:flex;gap:8px;align-items:center">
                    <input type="hidden" name="reportId" th:value="${r.id}" />
                    <input type="number" step="0.01" name="actualQuantity" placeholder="actual kg" class="form-control form-control-sm" />
                    <input type="file" name="proofImage" accept="image/*" class="form-control form-control-sm" />
                    <button class="btn btn-sm btn-success" type="submit">Complete</button>
                </form>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(reports)}">
            <td colspan="5">No assigned tasks.</td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
