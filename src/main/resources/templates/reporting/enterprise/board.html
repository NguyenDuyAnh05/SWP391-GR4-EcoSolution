<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Enterprise Board</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-4">
    <h1>Enterprise Board - Pending Reports</h1>
    <table class="table mt-3">
        <thead>
        <tr>
            <th>Submitted At</th>
            <th>Address</th>
            <th>Ward</th>
            <th>Quantity</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="r : ${reports}">
            <td th:text="${#temporals.format(r.createdAt, 'yyyy-MM-dd HH:mm:ss')}"></td>
            <td th:text="${r.address}"></td>
            <td th:text="${r.ward != null} ? ${r.ward.name} : 'N/A'"></td>
            <td th:text="${r.quantity}"></td>
            <td>
                <form th:action="@{'/enterprise/claim/' + ${r.id}}" method="post" style="display:inline">
                    <button class="btn btn-sm btn-success" type="submit">Claim</button>
                </form>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(reports)}">
            <td colspan="5">No pending reports.</td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
