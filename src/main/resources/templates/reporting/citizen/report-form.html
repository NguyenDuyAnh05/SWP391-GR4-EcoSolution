<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Citizen Report</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>.muted-row { opacity: 0.6; }</style>
</head>
<body>
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center">
        <h1>Submit Waste Report</h1>
        <div>
            <a class="btn btn-secondary me-2" th:href="@{/citizen/dashboard}">Dashboard</a>
            <a class="btn btn-outline-primary" th:href="@{/citizen/reports}">View My History</a>
        </div>
    </div>

    <div th:if="${message}" class="alert alert-success mt-3" th:text="${message}"></div>
    <div th:if="${error}" class="alert alert-danger mt-3" th:text="${error}"></div>

    <form th:action="@{/citizen/report}" method="post" enctype="multipart/form-data" class="mt-3">
        <div class="mb-3">
            <label for="ward" class="form-label">Ward</label>
            <select id="ward" name="wardId" class="form-select" required>
                <option value="" th:if="${#lists.isEmpty(wards)}">No wards available</option>
                <option th:each="w : ${wards}" th:value="${w.id}" th:text="${w.name}"
                    th:selected="${reportRequest != null} ? ${w.id} == ${reportRequest.wardId} : false"></option>
            </select>
        </div>

        <div class="mb-3">
            <label for="address" class="form-label">Address</label>
            <input id="address" name="address" class="form-control" th:value="${reportRequest != null} ? ${reportRequest.address} : ''" required />
        </div>

        <div class="mb-3">
            <label for="quantity" class="form-label">Quantity (kg)</label>
            <input id="quantity" type="number" step="0.01" name="quantity" class="form-control" th:value="${reportRequest != null} ? ${reportRequest.quantity} : ''" />
        </div>

        <div class="mb-3">
            <label for="wasteType" class="form-label">Waste Type</label>
            <select id="wasteType" name="wasteType" class="form-select">
                <option value="">Select type</option>
                <option value="RECYCLABLE" th:selected="${reportRequest != null} ? ${reportRequest.wasteType} == 'RECYCLABLE' : false">Recyclable</option>
                <option value="NON_RECYCLABLE" th:selected="${reportRequest != null} ? ${reportRequest.wasteType} == 'NON_RECYCLABLE' : false">Non-recyclable</option>
                <option value="OTHER" th:selected="${reportRequest != null} ? ${reportRequest.wasteType} == 'OTHER' : false">Other</option>
            </select>
        </div>

        <div class="mb-3">
            <label for="description" class="form-label">Description (optional)</label>
            <textarea id="description" name="description" class="form-control" rows="3" th:text="${reportRequest != null} ? ${reportRequest.description} : ''"></textarea>
        </div>

        <div class="mb-3">
            <label for="image" class="form-label">Photo (Max 5MB)</label>
            <input id="image" type="file" name="image" accept="image/*" class="form-control" />
        </div>

        <button class="btn btn-primary" type="submit">Submit</button>
    </form>
</div>
</body>
</html>
