<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
	<title>Create Report</title>
</head>
<body>
<div class="container mt-4">
	<h1>Create Waste Report</h1>
	<form th:action="@{/citizen/report}" method="post" enctype="multipart/form-data">
		<div class="mb-3">
			<label class="form-label">Address</label>
			<input name="address" class="form-control" required />
		</div>
		<div class="mb-3">
			<label class="form-label">Ward</label>
			<select name="wardId" class="form-select" required>
				<option th:each="w : ${wards}" th:value="${w.id}" th:text="${w.name}"></option>
			</select>
		</div>
		<div class="mb-3">
			<label class="form-label">Quantity (kg)</label>
			<input name="quantity" class="form-control" type="number" step="0.01" />
		</div>
		<div class="mb-3">
			<label class="form-label">Image (optional, max 5MB)</label>
			<input name="image" class="form-control" type="file" accept="image/*" />
		</div>
		<button class="btn btn-primary" type="submit">Submit</button>
	</form>
</div>
</body>
</html>
