<div th:fragment="body">
    <h1>Dashboard</h1>
    <div class="mb-3">
        <a href="/reports/new" class="btn btn-primary">Create Report</a>
    </div>
    <table class="table">
        <thead><tr><th>ID</th><th>Address</th><th>Status</th><th>Actions</th></tr></thead>
        <tbody>
        <tr th:each="r : ${reports}">
            <td th:text="${r.id}"></td>
            <td th:text="${r.address}"></td>
            <td th:text="${r.status}"></td>
            <td><a th:href="@{/reports/{id}(id=${r.id})}" class="btn btn-sm btn-outline-primary">View</a></td>
        </tr>
        </tbody>
    </table>
</div>
