<div th:fragment="body">
    <h1>Create Waste Report</h1>
    <form th:action="@{/reports}" method="post" enctype="multipart/form-data">
        <div class="mb-3">
            <label class="form-label">Waste Type</label>
            <select name="wasteType" class="form-select">
                <option value="RECYCLABLE">Recyclable</option>
                <option value="NON_RECYCLABLE">Non-Recyclable</option>
                <option value="OTHER">Other</option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">Address</label>
            <input type="text" name="address" class="form-control" required />
        </div>
        <div class="mb-3">
            <label class="form-label">Preferred Date</label>
            <input type="date" name="preferredDate" class="form-control" />
        </div>
        <div class="mb-3">
            <label class="form-label">Estimated Quantity (kg)</label>
            <input type="number" step="0.01" name="submittedQuantity" class="form-control" />
        </div>
        <div class="mb-3">
            <label class="form-label">Description</label>
            <textarea name="description" class="form-control"></textarea>
        </div>
        <div class="mb-3">
            <label class="form-label">Image (optional)</label>
            <input type="file" name="image" class="form-control" />
        </div>
        <button class="btn btn-primary" type="submit">Submit</button>
    </form>
</div>
