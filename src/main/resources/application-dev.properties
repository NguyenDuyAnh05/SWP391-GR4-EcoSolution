############################################################
# APPLICATION INFORMATION
############################################################

# Application name (used in logs and monitoring)
spring.application.name=ecosolution-dev


############################################################
# DATABASE CONFIGURATION (LOCAL DEVELOPMENT)
############################################################

# Database connection string.
# Default value points to local MySQL.
# Can be overridden using environment variable DB_URL.
spring.datasource.url=${DB_URL:jdbc:mysql://127.0.0.1:3306/SWP391_EcoSolution}
# Local development credentials.
# DO NOT use root in production.
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASS:root}

# Explicit driver declaration (Spring can auto-detect, but explicit is clearer for juniors)
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


############################################################
# JPA / HIBERNATE SETTINGS (DEVELOPMENT MODE)
############################################################

# update = automatically creates/updates tables based on entities.
# Safe ONLY for development.
spring.jpa.hibernate.ddl-auto=update

# Show SQL queries in console for debugging.
spring.jpa.show-sql=true

# Format SQL output for readability.
spring.jpa.properties.hibernate.format_sql=true

# Hibernate dialect for MySQL.
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect


############################################################
# LOGGING CONFIGURATION (DEVELOPMENT)
############################################################

# Root logging level.
logging.level.root=INFO

# Enable debug logging for application package.
logging.level.com.yourpackage=DEBUG

# Log SQL statements and parameters (ONLY for development).
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE


############################################################
# JWT CONFIGURATION (DEVELOPMENT)
############################################################

# JWT signing secret.
# Default value is provided for local testing ONLY.
# MUST be overridden in production.
app.jwt.secret=${JWT_SECRET:dev-unsafe-secret-key}

# Token expiration time (in milliseconds).
# 86400000 ms = 24 hours
app.jwt.expiration=86400000


############################################################
# GOOGLE OAUTH2 CONFIGURATION (DEVELOPMENT)
############################################################

# These values should be set via environment variables.
# Never commit real credentials to Git.
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=openid,profile,email


############################################################
# CLOUDINARY CONFIGURATION (DEVELOPMENT)
############################################################

# All credentials must come from environment variables.
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}


############################################################
# SWAGGER / OPENAPI (ENABLED IN DEV)
############################################################

# Enable API documentation for frontend developers.
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger


############################################################
# FILE UPLOAD LIMITS (BASIC PROTECTION)
############################################################

# Limit file upload size to prevent abuse.
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB


############################################################
# SERVER CONFIGURATION
############################################################

# Default local port.
server.port=8080