spring.application.name=EcoSolution

# MySQL (local)
spring.datasource.url=jdbc:mysql://localhost:3306/ecosolution?createDatabaseIfNotExist=true&serverTimezone=Asia/Ho_Chi_Minh&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root

# Hibernate / JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Server
server.port=8080

# Multipart limits (enforce 6MB ceiling at container level; mapper enforces 5MB business rule)
spring.servlet.multipart.max-file-size=6MB
spring.servlet.multipart.max-request-size=6MB

