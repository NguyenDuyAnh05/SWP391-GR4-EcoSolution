spring.application.name=ecosolution

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/SWP391_EcoSolution}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASS:root}


##change when deploy to production##
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Placeholder for third-party API keys (set via env or CI secrets)
third.party.api.key=${THIRD_PARTY_API_KEY:}
