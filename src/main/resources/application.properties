spring.application.name=EcoSolution_EVOSNDA

#Database configuration
spring.datasource.url=jdbc:mysql://localhost:3306/ecosolutionv2
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}


#JPA configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

server.port=8080

# Upload limits
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

#Cloudinary
cloudinary.cloud-name=${cloud_name}
cloudinary.api-key=${cloud_api_key}
cloudinary.api-secret=${cloud_api_secret}

#VNPAY
vnpay.tmnCode=${VNPAY_TMN_CODE}
vnpay.hashSecret=${VNPAY_HASH_SECRET}
vnpay.url=https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
vnpay.returnUrl=http://localhost:8080/api/v1/payment/vnpay-return
vnpay.version=2.1.0
vnpay.command=pay